name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pet-and-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install Pillow
      - run: python scripts/validate_pet.py
      - run: ./macos/BubuQuotaPanel/scripts/build.sh
      - run: file macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel
      - run: lipo macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel -verify_arch arm64 x86_64
      - run: codesign --verify --deep --strict macos/BubuQuotaPanel/build/卜卜额度面板.app
      - run: zsh -n macos/package/*.command macos/BubuQuotaPanel/scripts/*.sh scripts/*.sh

  windows-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          $failed = $false
          Get-ChildItem -Path windows -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error ("Parse errors in " + $_.FullName + ": " + ($errors | Out-String))
            }
          }
          if ($failed) { exit 1 }
      - shell: powershell
        run: .\scripts\build-windows-release.ps1
