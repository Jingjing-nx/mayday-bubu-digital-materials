name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pet-and-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install Pillow
      - run: python scripts/validate_pet.py
      - run: ./macos/BubuQuotaPanel/scripts/build.sh
      - run: file macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel
      - run: lipo macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel -verify_arch arm64 x86_64
      - name: Verify macOS 12.3 deployment target
        run: |
          APP="macos/BubuQuotaPanel/build/卜卜额度面板.app"
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$APP/Contents/Info.plist")" = "12.3"
          test "$(vtool -show-build "$APP/Contents/MacOS/BubuQuotaPanel" | grep -c 'minos 12.3')" -eq 2
      - run: codesign --verify --deep --strict macos/BubuQuotaPanel/build/卜卜额度面板.app
      - name: Verify saved-position fallback
        run: |
          STATE="$(mktemp)"
          printf '%s\n' '{"electron-avatar-overlay-open":true,"electron-avatar-overlay-bounds":{"x":100,"y":300,"width":356,"height":320,"mascot":{"left":165,"top":70,"width":163}}}' > "$STATE"
          BUBU_CODEX_STATE_FILE="$STATE" macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel --print-saved-panel-location | grep 'source=saved-state-mascot.*gap=14.0 centerError=0.0'
          printf '%s\n' '{"electron-avatar-overlay-open":true,"electron-avatar-overlay-bounds":{"x":100,"y":300,"width":356,"height":320,"anchor":{"x":265,"y":435,"width":163,"height":177}}}' > "$STATE"
          BUBU_CODEX_STATE_FILE="$STATE" macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel --print-saved-panel-location | grep 'source=saved-state-anchor.*gap=14.0 centerError=0.0'
          rm -f "$STATE"
      - name: Verify panel/pet geometry
        run: |
          BIN='macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel'
          "$BIN" --self-test-placement
          BUBU_SHOW_MARKET_PRICES=false "$BIN" --self-test-placement
      - name: Verify Gatekeeper help entries
        run: |
          plutil -lint 'macos/package/如果仍无法打开-Apple官方步骤.webloc'
          test "$(plutil -extract URL raw 'macos/package/如果仍无法打开-Apple官方步骤.webloc')" = 'https://support.apple.com/guide/mac-help/mh40616/mac'
          grep -Fq 'x-apple.systempreferences:com.apple.preference.security?General' 'macos/package/安装被拦截-打开隐私与安全.html'
          ! grep -R 'x-apple.systempreferences:' macos/package --include='*.webloc'
      - name: Verify panel runtime health
        run: |
          BIN='macos/BubuQuotaPanel/build/卜卜额度面板.app/Contents/MacOS/BubuQuotaPanel'
          "$BIN" --print-panel-config | grep 'version=1.0.7 marketPricesEnabled=true width=224 height=160'
          BUBU_SHOW_MARKET_PRICES=false "$BIN" --print-panel-config | grep 'version=1.0.7 marketPricesEnabled=false width=224 height=116'
          HEALTH="$(mktemp)"
          rm -f "$HEALTH"
          BUBU_PANEL_HEALTH_FILE="$HEALTH" "$BIN" &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; rm -f "$HEALTH"' EXIT
          for _ in {1..50}; do
            test -s "$HEALTH" && break
            sleep 0.1
          done
          grep '"version":"1.0.7"' "$HEALTH"
          grep '"marketPricesEnabled":true' "$HEALTH"
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          rm -f "$HEALTH"
          BUBU_PANEL_HEALTH_FILE="$HEALTH" BUBU_SHOW_MARKET_PRICES=false "$BIN" &
          PID=$!
          for _ in {1..50}; do
            test -s "$HEALTH" && break
            sleep 0.1
          done
          grep '"version":"1.0.7"' "$HEALTH"
          grep '"marketPricesEnabled":false' "$HEALTH"
          grep '"panelHeightPoints":116' "$HEALTH"
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
      - name: Build both macOS release variants
        run: |
          ./scripts/build-macos-release.sh
          test -f dist/Mayday-Bubu-macOS-Universal-v1.0.7.zip
          test -f dist/Mayday-Bubu-macOS-Universal-Codex-Only-v1.0.7.zip
          test -f build/release/卜卜-macOS-仅Codex额度/CODEX-ONLY.txt
          test ! -f build/release/卜卜-macOS/CODEX-ONLY.txt
      - run: zsh -n macos/package/*.command macos/BubuQuotaPanel/scripts/*.sh scripts/*.sh

  windows-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          $failed = $false
          Get-ChildItem -Path windows -Filter *.ps1 -Recurse | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error ("Parse errors in " + $_.FullName + ": " + ($errors | Out-String))
            }
          }
          if ($failed) { exit 1 }
      - name: Verify full and Codex-only Windows panels
        shell: powershell
        run: |
          $panel = ".\windows\BubuQuotaPanel\BubuQuotaPanel.ps1"
          $fullConfig = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $panel -PrintConfiguration
          if ($LASTEXITCODE -ne 0 -or $fullConfig -notmatch "version=1.0.1 marketPricesEnabled=true width=224 height=160") {
            throw "Unexpected full panel configuration: $fullConfig"
          }
          $fullXaml = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $panel -ValidateXaml
          if ($LASTEXITCODE -ne 0 -or $fullXaml -notmatch "height=160 marketRows=Visible") {
            throw "Full panel XAML validation failed: $fullXaml"
          }

          $env:BUBU_SHOW_MARKET_PRICES = "false"
          $onlyConfig = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $panel -PrintConfiguration
          if ($LASTEXITCODE -ne 0 -or $onlyConfig -notmatch "version=1.0.1 marketPricesEnabled=false width=224 height=116") {
            throw "Unexpected Codex-only panel configuration: $onlyConfig"
          }
          $onlyXaml = & powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File $panel -ValidateXaml
          if ($LASTEXITCODE -ne 0 -or $onlyXaml -notmatch "height=116 marketRows=Collapsed") {
            throw "Codex-only panel XAML validation failed: $onlyXaml"
          }
          Remove-Item Env:BUBU_SHOW_MARKET_PRICES
      - name: Build both Windows release variants
        shell: powershell
        run: |
          .\scripts\build-windows-release.ps1
          if (-not (Test-Path -LiteralPath "dist\Mayday-Bubu-Windows-10-11-v1.0.1.zip")) { throw "Full ZIP missing" }
          if (-not (Test-Path -LiteralPath "dist\Mayday-Bubu-Windows-10-11-Codex-Only-v1.0.1.zip")) { throw "Codex-only ZIP missing" }
          if (Test-Path -LiteralPath "build\release\卜卜-Windows\CODEX-ONLY.txt") { throw "Full package contains Codex-only marker" }
          if (-not (Test-Path -LiteralPath "build\release\卜卜-Windows-仅Codex额度\CODEX-ONLY.txt")) { throw "Codex-only marker missing" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-v1.0.1
          if-no-files-found: error
          path: |
            dist/Mayday-Bubu-Windows-10-11-v1.0.1.zip
            dist/Mayday-Bubu-Windows-10-11-Codex-Only-v1.0.1.zip
