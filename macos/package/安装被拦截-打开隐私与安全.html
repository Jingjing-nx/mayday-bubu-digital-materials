<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>允许打开卜卜安装文件</title>
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
    body { max-width: 680px; margin: 56px auto; padding: 0 24px; line-height: 1.65; }
    .card { padding: 30px; border: 1px solid #8e8e9338; border-radius: 20px; background: #8e8e9314; }
    h1 { margin-top: 0; font-size: 26px; }
    .button { display: inline-block; margin: 8px 0 18px; padding: 12px 20px; border-radius: 12px; color: white; background: #087cff; font-weight: 650; text-decoration: none; }
    .note { color: #8e8e93; font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>允许打开卜卜安装文件</h1>
    <p>正在尝试打开 Mac 的“隐私与安全”设置。如果没有自动跳转，请点击下面的按钮。</p>
    <p><a class="button" href="x-apple.systempreferences:com.apple.preference.security?General">打开“隐私与安全”</a></p>
    <ol>
      <li>找到有关“安装卜卜-macOS.command”被拦截的提示。</li>
      <li>点击“仍要打开”或“Open Anyway”，并输入 Mac 登录密码。</li>
      <li>返回解压文件夹，重新双击“安装卜卜-macOS.command”。</li>
    </ol>
    <p class="note">“仍要打开”只会在先尝试打开安装文件后出现。如果仍有问题，<a href="https://support.apple.com/guide/mac-help/mh40616/mac" rel="noreferrer">查看 Apple 官方步骤</a>。</p>
  </main>
  <script>
    window.setTimeout(function () {
      window.location.href = "x-apple.systempreferences:com.apple.preference.security?General";
    }, 250);
  </script>
</body>
</html>
